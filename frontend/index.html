<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Yoklama Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-view" class="box">
        <h2>Giris Yap</h2>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="pass" placeholder="Sifre">
        <button onclick="app.login()">Giris</button>
    </div>

    <div id="teacher-view" class="box hidden">
        <h2>Ogretmen Paneli</h2>
        <p id="t-name"></p>
        <div id="course-list"></div>
        <button onclick="app.logout()">Cikis</button>
    </div>

    <div id="session-view" class="box hidden">
        <h2 id="s-title"></h2>
        <div id="qr-code"></div>
        <p>PIN: <span id="s-pin"></span></p>
        <div id="student-list"></div>
        <button onclick="app.closeSession()">Kapat</button>
    </div>

    <div id="student-view" class="box hidden">
        <h2>Ogrenci Paneli</h2>
        <p id="st-name"></p>
        <input type="text" id="qr-input" placeholder="QR Kodu veya PIN">
        <div id="reader" style="width: 100%; margin-top: 10px;" class="hidden"></div>
        <button id="scan-btn" onclick="app.startScanner()">Kamerayi Ac</button>
        <button onclick="app.sendAttendance()">Gonder</button>
        <button onclick="app.logout()">Cikis</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="app.js"></script>
</body>
</html>
